services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ktu_pyq
      POSTGRES_USER: ktu_user
      POSTGRES_PASSWORD: ktu_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ktu_user -d ktu_pyq"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://ktu_user:ktu_pass@postgres:5432/ktu_pyq
      UPLOAD_DIR: /app/uploads
      ALLOWED_ORIGINS: http://localhost,http://localhost:80
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
